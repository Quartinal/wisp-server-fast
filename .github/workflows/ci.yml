name: Build & Release

on:
  push:
    branches: [develop]
  pull_request:
  workflow_dispatch:

jobs:
  build-node:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    name: node/${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g @napi-rs/cli

      - name: Install Node deps
        working-directory: bindings/node
        run: npm install

      - name: Install musl tools (x86_64-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Zig (aarch64 Linux)
        if: contains(matrix.target, 'aarch64') && contains(matrix.target, 'linux')
        uses: mlugg/setup-zig@v2

      - name: Clean pre-existing native binaries
        working-directory: bindings/node
        shell: bash
        run: rm -f *.node

      - name: Build
        working-directory: bindings/node
        run: napi build --platform --release --target ${{ matrix.target }} ${{ (contains(matrix.target, 'aarch64') && contains(matrix.target, 'linux')) && '--cross-compile' || '' }}

      - name: Pack (npm)
        working-directory: bindings/node
        shell: bash
        run: |
          npm pack
          mv *.tgz epoxy-server-node-${{ matrix.target }}.tgz

      - uses: actions/upload-artifact@v4
        with:
          name: node.${{ matrix.target }}
          path: bindings/node/epoxy-server-node-${{ matrix.target }}.tgz
          if-no-files-found: error

  build-bun:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    name: bun/${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - run: npm install -g @napi-rs/cli

      - name: Install Node deps
        working-directory: bindings/bun
        run: npm install

      - name: Install musl tools (x86_64-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Zig (aarch64 Linux)
        if: contains(matrix.target, 'aarch64') && contains(matrix.target, 'linux')
        uses: mlugg/setup-zig@v2

      - name: Clean pre-existing native binaries
        working-directory: bindings/bun
        shell: bash
        run: rm -f *.node

      - name: Build
        working-directory: bindings/bun
        run: napi build --platform --release --target ${{ matrix.target }} ${{ (contains(matrix.target, 'aarch64') && contains(matrix.target, 'linux')) && '--cross-compile' || '' }}

      - name: Pack (bun)
        working-directory: bindings/bun
        shell: bash
        run: |
          bun pm pack
          mv *.tgz epoxy-server-bun-${{ matrix.target }}.tgz

      - uses: actions/upload-artifact@v4
        with:
          name: bun.${{ matrix.target }}
          path: bindings/bun/epoxy-server-bun-${{ matrix.target }}.tgz
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-node, build-bun]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect tarballs
        run: |
          mkdir -p release
          find dist -name "*.tgz" -exec cp {} release/ \;

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          body: |
            Automated build from commit ${{ github.sha }}

            ## Files

            Each `.tgz` is a self-contained npm/bun package for the named platform.

            | Prefix | Runtime |
            |--------|---------|
            | `epoxy-server-node-` | Node.js (`npm install`) |
            | `epoxy-server-bun-`  | Bun (`bun add`)         |

            ### Targets
            - `x86_64-unknown-linux-gnu`
            - `x86_64-unknown-linux-musl`
            - `aarch64-unknown-linux-gnu`
            - `aarch64-unknown-linux-musl`
            - `x86_64-apple-darwin`
            - `aarch64-apple-darwin`
            - `x86_64-pc-windows-msvc`
            - `aarch64-pc-windows-msvc`
          files: release/*.tgz
          fail_on_unmatched_files: true
